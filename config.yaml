# ============================================================
# CAPTCHA Recognition System - Global Configuration (Single Source of Truth)
# Architecture: ConvNeXt V2-Tiny + CBAM + BiLSTM + CTC/CE Hybrid Loss
# ============================================================

# ==================== Character Set Configuration ====================
# Character source: chars_config.yaml (higher priority than this)
characters: "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789"
num_classes: 62
max_length: 6
blank_index: 62
total_classes: 63

# ==================== Image Size Configuration ====================
# Image source: image_config.yaml (higher priority than this)
image_size:
  original: [200, 60]        # Generator output (width, height)
  preprocessed: [64, 256]    # Model input (height, width)
  model_input: [3, 64, 256]  # Model input tensor (C, H, W)

# ==================== Data Directory Configuration ====================
data:
  preprocessed_dir: "data/preprocessed"
  train_dir: "data/preprocessed/train"
  val_dir: "data/preprocessed/val"
  test_dir: "data/preprocessed/test"

  # Preprocessing parameters
  preprocess:
    output_size: [64, 256]
    use_grayscale: true
    use_otsu: false
    use_median_blur: true
    median_blur_kernel: 3
    use_clahe: false
    clahe_clip: 2.0
    clahe_grid: [8, 8]

  # CAPTCHA generation parameters (for streaming training)
  captcha:
    difficulty: "industrial_medium"
    adhesion_prob: 0.15
    distortion:
      amplitude: [0.6, 1.8]

# ==================== Fixed Dataset Configuration ====================
fixed_data:
  val_dir: "data/fixed/val"
  test_dir: "data/fixed/test"
  num_samples: 4000       # Samples per set

# ==================== Streaming Dataset Configuration ====================
streaming_dataset:
  enabled: false            # Disabled by default, controlled by script parameters during training
  num_samples_per_epoch: 150000
  quality_check:
    min_laplacian_variance: 30
    min_contrast: 15
    brightness_min: 15
    brightness_max: 245
  seed: 42

# ==================== Model Configuration ====================
model:
  chars_config_file: "chars_config.yaml"

  core:
    backbone: "convnextv2_tiny"
    pretrained: true
    attention: "cbam"
    pool_size: [2, 8]
    time_steps: 16
    decoder_type: "transformer"
    decoder:
      hidden_size: 256
      num_layers: 2
      dropout: 0.3
    transformer_encoder:
      d_model: 512
      nhead: 8
      num_layers: 3
      dim_feedforward: 2048
      dropout: 0.3

  baseline:
    type: "vgg_bilstm"
    checkpoint_name: "baseline_vgg_best.pth"

# ==================== Training Configuration ====================

# [Recommended] Training parameters (new code reads this section first)
training:
  num_epochs: 120
  batch_size: 64
  val_batch_size: 256
  num_workers: 4
  seed: 42
  learning_rate: 0.00005
  weight_decay: 0.00005
  optimizer: adamw
  scheduler: onecycle
  warmup_epochs: 5
  warmup_pct: 0.15
  max_lr: 0.0005
  final_div_factor: 250
  backbone_lr_ratio: 1.0     # When unfrozen, Backbone LR = learning_rate * backbone_lr_ratio
  ctc_weight: 0.6
  ce_weight: 0.4
  label_smoothing: 0.1
  grad_clip: 1.0
  amp: true
  freeze_backbone_epochs: 10
  gradient_accumulation_steps: 1
  save_dir: "checkpoints"
  save_best_only: true
  log_dir: "logs"
  enable_memory_monitor: true
  checkpoint_dir: "checkpoints"
  gradient_clipping:
    enabled: true
    max_norm: 1.0
  early_stopping:
    enabled: true
    patience: 20
    min_delta: 0.001
  lm_weight: 0.1             # n-gram language model weight, 0.0 means disabled
  mixup_alpha: 0.3           # MixUp Beta distribution parameter, 0.0 means disabled (recommended: 0.2~0.5)

# ==================== CutMix Configuration ====================
cutmix:
  enabled: false
  alpha: 1.0
  p: 0.5
  mix_labels: true

# ==================== Data Augmentation Configuration ====================
augmentation:
  train:
    enabled: true
    rotate:
      limit: 5
      p: 0.3
    affine:
      translate_percent: 0.05
      scale_limit: [0.95, 1.05]
      rotate_limit: 5
      shear_limit: 0
      p: 0.5
    brightness_contrast:
      brightness_limit: 0.15
      contrast_limit: 0.15
      p: 0.5
    gauss_noise:
      var_limit: [5.0, 25.0]
      p: 0.3
    gaussian_blur:
      blur_limit: [3, 5]
      p: 0.2
    random_erasing:
      p: 0.3
      scale: [0.02, 0.15]
      ratio: [0.3, 3.0]
    coarse_dropout:
      p: 0.2
      max_holes: 4
      max_height: 12
      max_width: 12
    grid_distortion:
      p: 0.3
      num_steps: 5
      distort_limit: 0.3
    elastic_transform:
      alpha: 1
      sigma: 1.0
      p: 0.2

  val:
    enabled: false

  test:
    enabled: false

# ==================== CAPTCHA Generator Configuration ====================
captcha_generation:
  difficulty: "industrial_medium"

  background:
    gradient_color_range: [200, 255]
    num_color_blobs: [1, 3]
    num_color_blocks: [0, 2]
    texture_lines: [1, 4]
    blur_kernel: [1, 3]
    alpha_range: [0.03, 0.08]

  interference_lines:
    num_lines: [2, 4]
    thickness: [1, 3]
    alpha_range: [0.10, 0.20]
    color_range: [40, 220]
    curve_points: [5, 8]

  noise:
    gaussian:
      sigma: [2.0, 5.0]
    salt_pepper:
      salt_ratio: [0.001, 0.003]
      pepper_ratio: [0.001, 0.003]
    speckle:
      intensity: [0.02, 0.06]
    jpeg_artifact:
      enabled: false
      quality: [60, 92]
      p: 0.25

  character:
    rotation: [-6, 6]
    scale: [0.96, 1.04]
    offset: [-3, 3]
    shear: [-0.05, 0.05]
    overlap_ratio: [0.05, 0.15]

  adhesion:
    probability: 0.15
    alpha: [0.16, 0.36]

  distortion:
    wave:
      enabled: true
      amplitude: [0.6, 1.8]
      period: [28.0, 70.0]
      p: 0.30

  quality_check:
    enabled: true
    occlusion:
      threshold: 0.0
    truncation:
      margin: 0
    blur:
      threshold: 30
    contrast:
      threshold: 15
    background_complexity:
      entropy_threshold: 0.0

# ==================== System Configuration ====================
system:
  seed: 42
  device: "auto"
  num_workers: 2
  pin_memory: true
  prefetch_factor: 2
  persistent_workers: false
  gradient_accumulation_steps: 1
  cuda:
    deterministic: true
    benchmark: false

# ==================== Logging Configuration ====================
logging:
  log_dir: "logs"
  tensorboard:
    enabled: true
    tensorboard_dir: "runs"
  console:
    level: "INFO"
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file:
    enabled: true
    log_dir: "logs/file"
    filename: "training.log"
    level: "INFO"
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    max_bytes: 10485760
    backup_count: 5

# ==================== Checkpoint Configuration ====================
checkpoint:
  checkpoint_dir: "checkpoints"
  save_best_only: true
  monitor: "val_accuracy"
  mode: "max"
  save_frequency: 5
  filename: "epoch_{epoch}_acc_{accuracy:.4f}.pth"

# ==================== Evaluation Configuration ====================
evaluation:
  test_data_dir: "data/preprocessed/test"
  batch_size: 256
  save_predictions: true
  predictions_dir: "results/predictions"
  generate_confusion_matrix: true
  confusion_matrix_dir: "results/confusion_matrix"

# ==================== Traditional Methods Configuration ====================
traditional_methods:
  opencv:
    enabled: true
    template_dir: "templates"
    threshold: 0.8
  simple_connected:
    enabled: true
    knn:
      n_neighbors: 3
    feature:
      use_pixel_density: true
      use_aspect_ratio: true
      use_projection: true
  results_dir: "results/traditional"

# ==================== Ablation Experiment Configuration ====================
ablation:
  num_epochs: 15
  batch_size: 64
  num_workers: 8
  learning_rate: 2e-4
  max_lr: 1e-3
  weight_decay: 5e-5
  warmup_epochs: 2

# ==================== Experiment Configuration ====================
experiments:
  name: "captcha_recognition_experiment"
  description: "CAPTCHA recognition based on ConvNeXt V2-Tiny + BiLSTM"
  tags: ["captcha", "convnextv2", "bilstm", "ctc"]
  results_dir: "results"
