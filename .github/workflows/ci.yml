name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run import tests
        run: |
          python -c "from models.model import CaptchaModel; print('Model import OK')"
          python -c "from utils.config_loader import get_config; print('Config loader OK')"
          python -c "from utils.decoder import beam_search_decode; print('Decoder OK')"

      - name: Check configuration consistency
        run: |
          python -c "
          from utils.config_loader import get_config
          config = get_config()
          ctc = config.get('training.ctc_weight')
          ce = config.get('training.ce_weight')
          assert abs(ctc + ce - 1.0) < 0.01, f'CTC({ctc}) + CE({ce}) != 1.0'
          print(f'CTC/CE weights: {ctc}/{ce} - OK')
          "

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t captcha-api:test .

      - name: Verify Docker image
        run: |
          docker images captcha-api:test
